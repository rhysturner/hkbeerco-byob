<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HK Beer Promo Redemption</title>
<meta name="description" content="Promo redemption landing page for HK Beer codes.">
<style>
  @font-face{
    font-family: 'Anton BYOB';
    src: url('../fonts/Anton-Regular.ttf') format('truetype');
    font-display: swap;
  }

  :root{
    --bg: #6E1514;
    --bg-dark: #4a0f0f;
    --panel: rgba(0, 0, 0, 0.22);
    --line: rgba(255, 84, 45, 0.35);
    --cream: #FBEFE6;
    --muted: rgba(251,239,230,0.72);
    --accent: #ff2a10;
    --ok: #3be477;
  }

  *{ box-sizing: border-box; margin: 0; padding: 0; }

  body{
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 28px 16px;
    background:
      radial-gradient(1100px 550px at 85% -10%, #8d2321 0%, transparent 58%),
      radial-gradient(900px 500px at -20% 120%, #3b0f10 0%, transparent 50%),
      var(--bg);
    color: var(--cream);
    font-family: Avenir, 'Avenir Next', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }

  .card{
    width: min(94vw, 640px);
    border: 1px solid var(--line);
    background: var(--panel);
    box-shadow: 0 16px 40px rgba(0,0,0,0.28);
    padding: 26px 22px 24px;
  }

  .brand{
    font-family: 'Anton BYOB', 'Anton', sans-serif;
    text-transform: uppercase;
    color: var(--accent);
    font-size: clamp(28px, 6vw, 54px);
    line-height: 0.9;
    letter-spacing: 0;
  }

  .status{
    margin-top: 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: clamp(24px, 5vw, 38px);
    font-weight: 800;
    line-height: 1.05;
    color: var(--cream);
  }

  .tick{
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--ok);
    color: #032010;
    display: inline-grid;
    place-items: center;
    font-size: 22px;
    font-weight: 900;
    flex-shrink: 0;
  }

  .meta{
    margin-top: 18px;
    display: grid;
    gap: 12px;
  }

  .row{
    border: 1px solid rgba(255,255,255,0.14);
    background: rgba(0,0,0,0.16);
    padding: 12px 14px;
  }

  .label{
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: rgba(251,239,230,0.6);
  }

  .value{
    margin-top: 4px;
    font-size: clamp(18px, 3.5vw, 25px);
    font-weight: 700;
    color: #fff;
    word-break: break-word;
  }

  .copy{
    margin-top: 18px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.55;
  }

  .invalid .status{
    color: #ffd6d0;
  }

  .invalid .tick{
    background: #ff6b6b;
    color: #3b0707;
  }
</style>
</head>
<body>
  <main class="card" id="card" aria-live="polite">
    <h1 class="brand">HK Beer Promo</h1>
    <div class="status" id="statusLine">
      <span class="tick" aria-hidden="true">✓</span>
      <span id="statusText">Thank you! Beer redeemed.</span>
    </div>

    <div class="meta">
      <div class="row">
        <div class="label">Promo Code</div>
        <div class="value" id="promoCodeValue">-</div>
      </div>
      <div class="row">
        <div class="label">Venue</div>
        <div class="value" id="promoVenueValue">-</div>
      </div>
    </div>

    <p class="copy" id="copyText">Show this confirmation to staff if requested.</p>
  </main>

<script>
(function(){
  const PROMO_TO_VENUE = {
    BAB852: 'Central: Belly and the Beer @bellyandthebeerhk',
    HJT852: 'Wan Chai: Hoppy Junction @hoppyjunctiontap.hk',
    HND852: 'Prince Edward: HANDS @handsbarhk',
    SMB852: "Kennedy Town: Smash\'d Burger @smashd.hk",
    KTH852: 'KT HK Beer Co',
    VIR852: 'Virtual'
  };

  function codeFromLocation(){
    const byQuery = new URLSearchParams(window.location.search).get('code');
    if(byQuery){
      return byQuery.trim().toUpperCase();
    }

    const parts = window.location.pathname.split('/').filter(Boolean);
    const promoIdx = parts.lastIndexOf('promo');
    if(promoIdx >= 0 && parts[promoIdx + 1]){
      return decodeURIComponent(parts[promoIdx + 1]).trim().toUpperCase();
    }

    return '';
  }

  const code = codeFromLocation();
  const venue = PROMO_TO_VENUE[code] || '';

  const card = document.getElementById('card');
  const promoCodeValue = document.getElementById('promoCodeValue');
  const promoVenueValue = document.getElementById('promoVenueValue');
  const statusText = document.getElementById('statusText');
  const copyText = document.getElementById('copyText');

  if(venue){
    promoCodeValue.textContent = code;
    promoVenueValue.textContent = venue;
    statusText.textContent = 'Thank you! Beer redeemed.';
    copyText.textContent = 'Your redemption has been recorded for this promo. Please enjoy responsibly.';
    return;
  }

  card.classList.add('invalid');
  promoCodeValue.textContent = code || 'Unknown';
  promoVenueValue.textContent = 'Not found';
  statusText.textContent = 'Promo code not recognised.';
  copyText.textContent = 'Please check the QR/code and try again, or ask HK Beer staff for help.';
})();
</script>
</body>
</html>
