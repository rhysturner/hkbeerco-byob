<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promo Login</title>
<meta name="description" content="Authenticated promo landing page.">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-7L2BPER1X3"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-7L2BPER1X3');
</script>
<style>
  *{ box-sizing: border-box; margin: 0; padding: 0; }

  body{
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    background: #6E1514;
    color: #FBEFE6;
    font-family: Avenir, 'Avenir Next', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }

  .card{
    width: min(94vw, 680px);
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(0,0,0,0.18);
    padding: 24px;
  }

  .header-art{
    width: 100%;
    height: auto;
    display: block;
    border: 1px solid rgba(255,255,255,0.18);
    margin-bottom: 18px;
  }

  .status-mark{
    width: 92px;
    height: 92px;
    margin: 2px auto 12px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.22);
    display: grid;
    place-items: center;
    font-size: 60px;
    font-weight: 800;
    line-height: 1;
    color: rgba(251,239,230,0.65);
    background: rgba(0,0,0,0.16);
    display: none;
  }

  .status-mark.show{
    display: grid;
  }

  .status-mark.valid{
    color: #33d764;
    border-color: rgba(51,215,100,0.6);
    background: rgba(24,126,49,0.22);
  }

  .status-mark.invalid{
    color: #ff5a5a;
    border-color: rgba(255,90,90,0.64);
    background: rgba(131,28,28,0.26);
  }

  h1{
    font-size: clamp(28px, 5vw, 44px);
    line-height: 1.1;
    text-align: center;
    font-weight: 700;
  }

  .meta{
    margin-top: 16px;
    display: none;
    gap: 10px;
  }

  .row{
    border: 1px solid rgba(255,255,255,0.16);
    background: rgba(0,0,0,0.15);
    padding: 10px 12px;
  }

  .label{
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: rgba(251,239,230,0.72);
  }

  .value{
    margin-top: 4px;
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    word-break: break-word;
  }

  .copy{
    margin-top: 14px;
    font-size: 14px;
    line-height: 1.5;
    color: rgba(251,239,230,0.85);
    text-align: center;
  }

  .footer{
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.14);
    text-align: center;
    font-size: 12px;
    line-height: 1.45;
    color: rgba(251,239,230,0.78);
  }
</style>
</head>
<body>
  <main class="card" id="card" aria-live="polite">
    <img class="header-art" src="../images/BYOB_Microsite_header_1.png" alt="Hong Kong Beer BYOB header">
    <div class="status-mark" id="statusMark" aria-hidden="true"></div>
    <h1 id="statusText">Welcome you are logged in</h1>
    <div class="meta" id="meta">
      <div class="row">
        <div class="label">Promo Code</div>
        <div class="value" id="promoCodeValue">-</div>
      </div>
      <div class="row">
        <div class="label">Venue</div>
        <div class="value" id="promoVenueValue">-</div>
      </div>
    </div>
    <p class="copy" id="copyText"></p>
    <p class="footer">Hong Kong Beer Co · Promo Access Verified</p>
  </main>

  <script>
  (function(){
    const PROMO_TO_VENUE = {
      BAB852: 'Central: Belly and the Beer @bellyandthebeerhk',
      HJT852: 'Wan Chai: Hoppy Junction @hoppyjunctiontap.hk',
      HND852: 'Prince Edward: HANDS @handsbarhk',
      SMB852: "Kennedy Town: Smash'd Burger @smashd.hk",
      KTH852: 'KT HK Beer Co',
      VIR852: 'Virtual'
    };

    function codeFromLocation(){
      const byQuery = new URLSearchParams(window.location.search).get('code');
      if(byQuery){
        return byQuery.trim().toUpperCase();
      }

      const parts = window.location.pathname.split('/').filter(Boolean);
      const promoIdx = parts.lastIndexOf('promo');
      if(promoIdx >= 0 && parts[promoIdx + 1]){
        return decodeURIComponent(parts[promoIdx + 1]).trim().toUpperCase();
      }

      return '';
    }

    const statusText = document.getElementById('statusText');
    const statusMark = document.getElementById('statusMark');
    const copyText = document.getElementById('copyText');
    const meta = document.getElementById('meta');
    const promoCodeValue = document.getElementById('promoCodeValue');
    const promoVenueValue = document.getElementById('promoVenueValue');

    const code = codeFromLocation();
    if(!code){
      copyText.textContent = '';
      return;
    }

    meta.style.display = 'grid';
    promoCodeValue.textContent = code;

    const venue = PROMO_TO_VENUE[code] || '';
    if(venue){
      statusMark.className = 'status-mark show valid';
      statusMark.textContent = '✓';
      statusText.textContent = 'Thank you! Beer redeemed.';
      promoVenueValue.textContent = venue;
      copyText.textContent = 'Your redemption has been recorded for this promo. Please enjoy responsibly.';
    } else {
      statusMark.className = 'status-mark show invalid';
      statusMark.textContent = '✕';
      statusText.textContent = 'Promo code not recognised.';
      promoVenueValue.textContent = 'Not found';
      copyText.textContent = 'Please check the QR/code and try again, or ask HK Beer staff for help.';
    }
  })();
  </script>
</body>
</html>
